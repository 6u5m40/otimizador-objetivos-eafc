name: Claude (auto-conserto)

# Responde quando alguém marca @claude numa issue ou comentário.
# É isso que faz o auto-conserto: o health check (ou o botão "relatar
# problema") abre uma issue marcando @claude, e este workflow aciona o Claude
# para investigar, consertar e abrir um PR.
on:
  issues:
    types: [opened, assigned]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude:
    if: |
      contains(github.event.issue.body, '@claude') ||
      contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          # Usa o token da sua assinatura Claude (Pro/Max) — sem cobrança de API.
          # Gere com "claude setup-token" e salve no secret CLAUDE_CODE_OAUTH_TOKEN.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
